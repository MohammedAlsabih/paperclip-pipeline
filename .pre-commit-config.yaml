# Pre-commit hooks for paperclip-pipeline.
# Required by docs/SECURE_SDLC.md §6 (AppSec tooling baseline).
#
# Engineer setup (one-time):
#   pip install pre-commit
#   pre-commit install
#
# After install, every `git commit` runs Gitleaks on staged content.
# CI re-runs the same scan on every PR — pre-commit is fast feedback, CI is the gate.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secrets scan)
        args: ["protect", "--staged", "--config=.gitleaks.toml", "--redact"]
