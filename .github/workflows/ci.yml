name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  spec-pipeline:
    name: spec-pipeline (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spec-pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: spec-pipeline/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run build

      - name: Test
        run: npm test
